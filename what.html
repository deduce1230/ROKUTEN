		<div class="text">
		「点字」は視覚障がい者のための文字です。<br>
１８３５年にフランス人で視覚障がい者でもあった、ルイ・ブライユによって創案されました。<br>
６個の点の組み合わせで日本語はもちろんのこと、世界中の言語や数字、楽譜も表すことができます。<br>
「触図」は、凹凸のある点や線・手触りの違いなどで、情報を伝え、地図やグラフ、絵本などに<br>使われています。<br>
六点会では広く点字や触図を知っていただくため、ワークショップの開催や、<br>
ユニバーサルデザインによるリーフレット制作など、啓蒙・啓発活動をおこなっています。<br><br>
